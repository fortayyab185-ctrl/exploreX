<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore - ExploreX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    /* ── Light theme palette for Explore (Soft & Dreamy) ─────── */
    :root {
      --ex-bg:       var(--background);
      --ex-surface:  var(--surface);
      --ex-border:   var(--border);
      --ex-muted:    var(--text-2);
      --ex-dark:     var(--text-1);
      --ex-panel-bg: rgba(255,255,255,0.94);
    }

    body { background: var(--ex-bg); overflow: hidden; }
    main.app-main { padding-top: 0; height: 100vh; position: relative; background: var(--ex-bg); }

    /* ── Globe stage ───────────────────────────────────────────── */
    #stage { position: absolute; inset: 64px 0 0; }
    body:has(.trial-banner) #stage { top: 104px; }
    #globe-canvas { position: absolute; inset: 0; cursor: grab; }
    #globe-canvas:active { cursor: grabbing; }

    /* Soft vignette */
    .vignette {
      position: absolute; inset: 0; pointer-events: none; z-index: 1;
      background:
        radial-gradient(ellipse at center, transparent 35%, rgba(247,250,250,0.85) 100%),
        radial-gradient(circle at 80% 0%, rgba(110,173,173,0.10), transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(134,159,140,0.10), transparent 50%);
    }

    /* ── Stage title (when no panel open) ───────────────────── */
    .stage-title {
      position: absolute;
      top: 56px; left: 0; right: 0;
      text-align: center;
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.8s, transform 0.8s;
      padding: 0 1.5rem;
    }
    .stage-title h1 {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: clamp(1.85rem, 4vw, 3rem);
      letter-spacing: -0.025em;
      line-height: 1.05;
      color: var(--ex-dark);
      margin: 0;
    }
    .stage-title h1 em {
      font-style: normal;
      color: var(--teal-700);
      font-weight: 700;
    }
    .stage-title .sub {
      margin-top: 0.6rem;
      color: var(--text-3);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    .stage-title.hidden-state {
      opacity: 0;
      transform: translateY(-30px);
      pointer-events: none;
    }

    /* ── Featured destinations list (bottom-left) ───────────── */
    .featured-list {
      position: absolute; bottom: 2.5rem; left: 2.5rem; z-index: 5;
      max-width: 240px;
      transition: opacity 0.6s;
      padding: 1.25rem;
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: var(--shadow-md);
    }
    .featured-list .lab {
      font-family: 'DM Sans', sans-serif;
      color: var(--teal-700);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 0.85rem;
    }
    .featured-list button {
      display: flex; align-items: center; gap: 0.7rem;
      color: var(--text-2);
      transition: all 0.25s;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.86rem;
      font-weight: 500;
      padding: 0.4rem 0;
      cursor: pointer;
      background: none; border: 0;
      width: 100%;
      text-align: left;
    }
    .featured-list button:hover {
      color: var(--ex-dark);
      transform: translateX(4px);
    }
    .featured-list .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .featured-list .flag {
      width: 22px; height: 16px;
      border-radius: 3px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.05);
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .featured-list button:hover .flag {
      transform: scale(1.08);
      box-shadow: 0 2px 6px rgba(0,0,0,0.22), 0 0 0 1px rgba(110,173,173,0.4);
    }
    .featured-list button:hover .dot {
      transform: scale(1.4);
      box-shadow: 0 0 0 3px rgba(110,173,173,0.18);
    }
    .featured-list.hidden-state { opacity: 0; pointer-events: none; }
    @media (max-width: 768px) { .featured-list { display: none; } }

    /* ── Country hover tooltip ──────────────────────────────────── */
    .country-tooltip {
      position: absolute;
      pointer-events: none;
      z-index: 15;
      padding: 0.45rem 0.85rem;
      border-radius: 9999px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 8px 24px rgba(26,46,46,0.10), 0 1px 2px rgba(26,46,46,0.05);
      font-family: 'Sora', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ex-dark);
      letter-spacing: -0.005em;
      transform: translate(-50%, calc(-100% - 12px));
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }
    .country-tooltip.show { opacity: 1; }
    @media (max-width: 768px) { .country-tooltip { display: none; } }

    /* ── Destination side panel (light) ─────────────────────── */
    .dest-panel {
      position: absolute;
      top: 0; right: 0; bottom: 0;
      z-index: 20;
      width: 100%;
      max-width: 440px;
      background: var(--ex-panel-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      color: var(--ex-dark);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.55s cubic-bezier(0.5, 0, 0.2, 1);
      overflow-y: auto;
      box-shadow: -8px 0 40px rgba(26,46,46,0.10);
      border-left: 1px solid var(--border-subtle);
    }
    .dest-panel.open { transform: translateX(0); }
    .dest-panel .head-img {
      position: relative;
      height: 240px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .dest-panel .head-img img {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scale(1.05);
      transition: transform 8s ease;
    }
    .dest-panel.open .head-img img { transform: scale(1.15); }
    .dest-panel .head-img .grad {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, var(--ex-surface));
    }
    .dest-panel .body { padding: 1.75rem 2rem 2.25rem; }
    .dest-panel .country-lab {
      font-family: 'DM Sans', sans-serif;
      color: var(--teal-700);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .dest-panel h2 {
      font-family: 'Sora', sans-serif;
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-top: 0.5rem;
      line-height: 1.05;
      color: var(--ex-dark);
    }
    .dest-panel .tagline {
      color: var(--text-2);
      font-size: 0.92rem;
      margin-top: 0.65rem;
      line-height: 1.6;
    }
    .dest-panel .meta-row {
      display: flex; align-items: center; gap: 1.25rem;
      margin-top: 1.25rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--text-2);
    }
    .dest-panel .meta-row .star { color: var(--warning); }
    .dest-panel .tags {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      margin-top: 1rem;
    }
    .dest-panel .tag {
      padding: 0.35rem 0.85rem;
      border-radius: 9999px;
      background: var(--teal-50);
      color: var(--teal-700);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .dest-panel .divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 1.75rem 0;
    }
    .dest-panel .actions {
      display: flex; flex-direction: column; gap: 0.65rem;
    }
    .dest-panel .act-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      padding: 0.95rem;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0;
      cursor: pointer;
      transition: all 0.25s;
      border: 0;
    }
    .dest-panel .act-grad {
      background: var(--teal);
      color: #fff;
      box-shadow: 0 8px 18px rgba(110,173,173,0.32);
    }
    .dest-panel .act-grad:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(110,173,173,0.45);
      background: var(--teal-600);
    }
    .dest-panel .act-line {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text-1);
    }
    .dest-panel .act-line:hover {
      color: var(--teal-700);
      border-color: var(--teal);
      background: var(--teal-50);
    }
    .dest-panel .more-list {
      margin-top: 1rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .dest-panel .more-list button {
      display: flex; align-items: center; gap: 0.85rem;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      background: var(--background);
      border: 1px solid var(--border-subtle);
      color: var(--text-2);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.86rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s;
      text-align: left;
    }
    .dest-panel .more-list button:hover {
      background: var(--teal-50);
      color: var(--teal-700);
      border-color: rgba(110,173,173,0.2);
    }
    .dest-panel .more-list .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dest-panel .close {
      position: sticky;
      top: 1rem;
      z-index: 5;
      margin-left: auto;
      margin-right: 1rem;
      margin-top: 1rem;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      color: var(--text-1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.25s;
      backdrop-filter: blur(8px);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-md);
    }
    .dest-panel .close:hover {
      background: var(--surface);
    }

    /* ── Full-screen scene view ─────────────────────────────── */
    .scene {
      position: fixed; inset: 0; z-index: 80;
      background: var(--ex-bg);
      opacity: 0; pointer-events: none;
      transition: opacity 0.6s;
      overflow: hidden;
    }
    .scene.show { opacity: 1; pointer-events: auto; }
    .scene .layer {
      position: absolute; inset: -40px;
      background-size: cover; background-position: center;
      transition: transform 0.35s cubic-bezier(0.2, 0.7, 0.3, 1);
      will-change: transform;
    }
    .scene .layer-bg { filter: blur(8px) brightness(0.85) saturate(0.7); }
    .scene .layer-mid { filter: brightness(0.9); }
    .scene .layer-fg { filter: brightness(1) saturate(1.05); }
    .scene .scene-vignette {
      position: absolute; inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to top, rgba(14,26,26,0.65) 0%, rgba(14,26,26,0.1) 50%, transparent 100%),
        radial-gradient(ellipse at center, transparent 40%, rgba(14,26,26,0.5) 100%);
    }
    .scene .scene-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding: 4rem 3rem;
      color: #fff;
      max-width: 1280px;
      margin: 0 auto;
    }
    .scene .scene-back {
      position: absolute; top: 2rem; left: 2rem;
      display: inline-flex; align-items: center; gap: 0.55rem;
      padding: 0.65rem 1.1rem;
      border-radius: 9999px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.6);
      color: var(--text-1);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: var(--shadow-md);
    }
    .scene .scene-back:hover {
      background: #fff;
      transform: translateX(-4px);
    }
    .scene .scene-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.4rem 0.95rem;
      border-radius: 9999px;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.25);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
      margin-bottom: 1rem;
      width: fit-content;
    }
    .scene .scene-eyebrow .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
    }
    .scene .scene-title {
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: -0.025em;
      line-height: 0.98;
      max-width: 900px;
    }
    .scene .scene-title em {
      font-style: normal;
      color: #B6DADA;
      font-weight: 600;
    }
    .scene .scene-sub {
      margin-top: 1.25rem;
      max-width: 540px;
      color: rgba(255,255,255,0.82);
      font-size: 1.05rem;
      line-height: 1.65;
    }
    .scene .scene-actions {
      display: flex; gap: 0.7rem;
      margin-top: 2.25rem;
      flex-wrap: wrap;
    }
    .scene .scene-actions .btn {
      background: #fff; color: var(--text-1);
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    }
    .scene .scene-actions .btn:hover {
      background: var(--teal);
      color: #fff;
    }
    .scene .scene-actions .btn-outline {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.32);
      backdrop-filter: blur(12px);
    }
    .scene .scene-actions .btn-outline:hover {
      background: rgba(255,255,255,0.26);
    }
    .scene-stats {
      display: flex; gap: 2.5rem;
      margin-top: 2.5rem;
    }
    .scene-stats .stat .v {
      font-family: 'Sora', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #fff;
    }
    .scene-stats .stat .l {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-top: 4px;
    }

    /* ── Globe loader ──────────────────────────────────────── */
    .globe-loader {
      position: absolute; inset: 0;
      display: flex; align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.25rem;
      color: var(--text-2);
      z-index: 4;
      transition: opacity 0.8s;
    }
    .globe-loader.gone { opacity: 0; pointer-events: none; }
    .globe-loader .pulse {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(110,173,173,0.45), transparent 65%);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.85; }
      50%      { transform: scale(1.45); opacity: 0.3; }
    }
    .globe-loader .lab {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--teal-700);
    }
  </style>
</head>
<body>
  <div id="app-nav-slot"></div>
  <main class="app-main">
    <div id="stage">
      <div id="globe-canvas"></div>
      <div class="vignette"></div>
      <div class="globe-loader" id="globe-loader">
        <div class="pulse"></div>
        <div class="lab">Calibrating Earth…</div>
      </div>
      <div class="stage-title" id="stage-title">
        <h1>Explore the <em>World</em></h1>
        <p class="sub">Drag · Click a destination · Discover</p>
      </div>
      <div class="featured-list" id="featured-list"></div>
      <div class="dest-panel" id="dest-panel"></div>
      <div class="country-tooltip" id="country-tooltip" aria-hidden="true"></div>
    </div>
    <div class="scene" id="scene">
      <div class="layer layer-bg" id="scene-layer-bg"></div>
      <div class="layer layer-mid" id="scene-layer-mid"></div>
      <div class="layer layer-fg" id="scene-layer-fg"></div>
      <div class="scene-vignette"></div>
      <div class="scene-content" id="scene-content"></div>
      <button class="scene-back" id="scene-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Globe
      </button>
    </div>
  </main>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="/js/sdk.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/explore-globe.js"></script>
  <script src="/js/chatbot.js"></script>
</body>
</html>
