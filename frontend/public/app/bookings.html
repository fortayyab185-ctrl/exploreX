<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Trips · ExploreX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .tab-row {
      display: flex; gap: .35rem; margin-bottom: 1.75rem;
      border-bottom: 1px solid var(--border-subtle); flex-wrap: wrap;
    }
    .tab {
      padding: .85rem 1.15rem; font-family: 'DM Sans', sans-serif;
      font-size: .85rem; font-weight: 500;
      cursor: pointer; position: relative;
      border-bottom: 2px solid transparent;
      color: var(--text-2);
      background: none;
      transition: color .2s;
    }
    .tab:hover { color: var(--text-1); }
    .tab.active { color: var(--teal-700); font-weight: 600; }
    .tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px; background: var(--teal); border-radius: 2px 2px 0 0;
    }
    .tab .count {
      background: var(--teal); color: #fff;
      padding: 2px 8px; border-radius: 9999px;
      margin-left: .5rem;
      font-size: .68rem; font-weight: 600;
      display: inline-block;
    }

    .booking-row-flat {
      display: grid; grid-template-columns: 120px 1fr auto; gap: 1.25rem; align-items: center;
      padding: 1.25rem; border-radius: 16px;
      border: 1px solid var(--border-subtle); background: #fff;
      margin-bottom: .85rem;
      box-shadow: var(--shadow-xs);
      transition: box-shadow .25s, transform .25s, border-color .25s;
    }
    .booking-row-flat:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--teal-50); }
    @media (max-width: 700px) { .booking-row-flat { grid-template-columns: 1fr; } }
    .booking-row-flat .img { aspect-ratio: 4/3; border-radius: 12px; overflow: hidden; background: var(--muted); }
    .booking-row-flat .img img { width: 100%; height: 100%; object-fit: cover; }
    .booking-row-flat h3 { font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 600; color: var(--text-1); }
    .booking-row-flat .meta { font-size: .82rem; color: var(--text-2); margin-top: .35rem; }
    .booking-row-flat .actions { display: flex; flex-direction: column; gap: .45rem; }
  </style>
</head>
<body>
  <div id="app-nav-slot"></div>
  <main class="app-main">
    <div class="page-wrap">
      <div class="page-header row-between">
        <div>
          <p class="page-eyebrow">My Bookings</p>
          <h1 class="page-title">My <em>Bookings</em></h1>
          <p class="page-sub">Track all your reservations — create a trip with dates, then add bookings within those dates.</p>
        </div>
        <button class="btn btn-primary" id="new-trip-btn">+ New Trip</button>
      </div>

      <div class="tab-row" id="tab-row">
        <button class="tab active" data-bucket="upcoming">Upcoming Trips</button>
        <button class="tab" data-bucket="past">Past Trips</button>
        <button class="tab" data-bucket="all-bookings">All Bookings</button>
      </div>

      <div id="content-out">
        <div class="text-center" style="padding:3rem"><div class="spinner spinner-lg" style="margin:0 auto"></div></div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/js/sdk.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/bookings.js"></script>
  <script src="/js/chatbot.js"></script>
</body>
</html>
