<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat · ExploreX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .chat-shell {
      display: grid; grid-template-columns: 300px 1fr;
      gap: 0; height: calc(100vh - 64px - 4rem);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow-sm);
    }
    @media (max-width: 768px) {
      .chat-shell { grid-template-columns: 1fr; }
      .chat-shell.has-active .threads { display: none; }
    }
    .threads {
      border-right: 1px solid var(--border-subtle);
      overflow-y: auto;
      background: var(--background);
    }
    .thread {
      display: flex; gap: .85rem;
      padding: 1rem 1.25rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border-subtle);
      transition: background .2s;
      position: relative;
    }
    .thread:hover { background: var(--hover-bg); }
    .thread.active {
      background: var(--teal-50);
    }
    .thread.active::before {
      content: ''; position: absolute; left: 0; top: 12px; bottom: 12px;
      width: 3px; background: var(--teal); border-radius: 0 3px 3px 0;
    }
    .thread .av {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--grad-primary);
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-weight: 600; font-size: .82rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: var(--shadow-xs);
    }
    .thread .nm {
      font-family: 'Sora', sans-serif;
      font-size: .92rem; font-weight: 600;
      color: var(--text-1);
    }
    .thread .preview {
      font-size: .78rem;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .conversation {
      display: flex; flex-direction: column;
      background: #fff;
      overflow: hidden;
      height: 100%;
    }
    .conv-head {
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border-subtle);
      display: flex; align-items: center; gap: .85rem;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(12px);
    }
    .conv-msgs {
      flex: 1; overflow-y: auto;
      padding: 1.5rem;
      display: flex; flex-direction: column;
      gap: .55rem;
      background: var(--background);
    }
    .msg {
      max-width: 75%;
      padding: .75rem 1rem;
      border-radius: 16px;
      font-size: .88rem;
      line-height: 1.5;
    }
    .msg.me {
      align-self: flex-end;
      background: var(--teal);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px rgba(110,173,173,0.25);
    }
    .msg.them {
      align-self: flex-start;
      background: #fff;
      color: var(--text-1);
      border: 1px solid var(--border-subtle);
      border-bottom-left-radius: 4px;
    }
    .conv-input {
      display: flex; gap: .55rem;
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border-subtle);
      background: #fff;
    }
    .conv-input input {
      flex: 1;
      border-radius: 9999px !important;
      padding: 0 1.2rem !important;
    }
    .conv-input .btn {
      border-radius: 50% !important;
      width: 48px; height: 48px;
      padding: 0 !important;
    }
  </style>
</head>
<body>
  <div id="app-nav-slot"></div>
  <main class="app-main">
    <div class="page-wrap" style="max-width:1200px">
      <div class="page-header">
        <p class="page-eyebrow">Direct</p>
        <h1 class="page-title">Messages</h1>
      </div>

      <div class="chat-shell" id="chat-shell">
        <div class="threads" id="threads"></div>
        <div id="conversation"><div class="empty"><div class="empty-icon"><i data-lucide="message-square" class="icon-md text-primary"></i></div><h3 class="empty-title">Pick a conversation</h3><p class="empty-sub">Tap a contact on the left to start chatting.</p></div></div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/js/sdk.js"></script>
  <script src="/js/app.js"></script>
  <script>
    let me, peers = [], activePeer = null, pollTimer = null;

    document.addEventListener('app:ready', async (e) => {
      me = e.detail.user;
      const params = new URLSearchParams(location.search);
      await buildThreads();
      const target = params.get('with');
      if (target) openThread(target);
      lucide.createIcons();
    });

    async function buildThreads() {
      try {
        const [conns, msgs, users] = await Promise.all([
          db.entities.Connection.list('-created_date', 200),
          db.entities.Message.list('-created_date', 500),
          db.entities.User.list(),
        ]);
        const accepted = conns.filter(c => c.status === 'accepted' && (c.from_user === me.email || c.to_user === me.email));
        const peerEmails = new Set(accepted.map(c => c.from_user === me.email ? c.to_user : c.from_user));
        msgs.forEach(m => {
          if (m.sender_email === me.email) peerEmails.add(m.receiver_email);
          if (m.receiver_email === me.email) peerEmails.add(m.sender_email);
        });
        peerEmails.delete(me.email);

        peers = Array.from(peerEmails).map(em => {
          const user = users.find(u => u.email === em) || { email: em, full_name: em.split('@')[0] };
          const lastMsg = msgs.find(m => (m.sender_email === em && m.receiver_email === me.email) || (m.sender_email === me.email && m.receiver_email === em));
          return { ...user, lastMsg };
        }).sort((a, b) => (b.lastMsg?.created_date || '').localeCompare(a.lastMsg?.created_date || ''));

        const threadsEl = document.getElementById('threads');
        if (!peers.length) {
          threadsEl.innerHTML = '<div class="empty" style="padding:2rem 1rem"><p class="text-sm text-muted">No conversations.</p><a class="btn btn-primary mt-3" href="/connect"><i data-lucide="user-plus" class="icon-sm"></i> Find people</a></div>';
        } else {
          threadsEl.innerHTML = peers.map(p => `
            <div class="thread ${activePeer === p.email ? 'active' : ''}" onclick="openThread('${p.email}')">
              <div class="av">${(p.full_name || p.email).split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase()}</div>
              <div style="min-width:0;flex:1">
                <div class="nm">${p.full_name || p.email}</div>
                <div class="preview">${p.lastMsg?.text || 'Say hi 👋'}</div>
              </div>
            </div>`).join('');
        }
      } catch (e) { toast.error(e.message); }
    }

    window.openThread = async function (email) {
      activePeer = email;
      document.getElementById('chat-shell').classList.add('has-active');
      document.querySelectorAll('.thread').forEach(t => t.classList.toggle('active', t.textContent.includes(email)));
      const peer = peers.find(p => p.email === email) || { email, full_name: email.split('@')[0] };
      const conv = document.getElementById('conversation');
      conv.innerHTML = `
        <div class="conversation">
          <div class="conv-head">
            <div class="user-avatar" style="width:36px;height:36px;font-size:.8rem">
              ${(peer.full_name || email).split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase()}
            </div>
            <div>
              <div style="font-weight:500">${peer.full_name || email}</div>
              <div class="text-xs text-muted">${email}</div>
            </div>
          </div>
          <div class="conv-msgs" id="conv-msgs"></div>
          <div class="conv-input">
            <input id="msg-input" class="field-input" placeholder="Type a message…">
            <button class="btn btn-primary" id="send-btn"><i data-lucide="send" class="icon-sm"></i></button>
          </div>
        </div>`;
      lucide.createIcons();
      document.getElementById('send-btn').onclick = sendMsg;
      document.getElementById('msg-input').onkeydown = (e) => { if (e.key === 'Enter') sendMsg(); };
      await loadMsgs();
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(loadMsgs, 4000);
    };

    async function loadMsgs() {
      if (!activePeer) return;
      try {
        const all = await db.entities.Message.list('-created_date', 200);
        const conv = all.filter(m =>
          (m.sender_email === me.email && m.receiver_email === activePeer) ||
          (m.sender_email === activePeer && m.receiver_email === me.email)
        ).reverse();
        const box = document.getElementById('conv-msgs');
        if (!box) return;
        box.innerHTML = conv.map(m => `<div class="msg ${m.sender_email === me.email ? 'me' : 'them'}">${escapeHtml(m.text)}</div>`).join('');
        box.scrollTop = box.scrollHeight;
      } catch (e) {}
    }

    async function sendMsg() {
      const inp = document.getElementById('msg-input');
      const text = inp.value.trim();
      if (!text || !activePeer) return;
      inp.value = '';
      try {
        await db.entities.Message.create({
          sender_email: me.email, sender_name: me.full_name,
          receiver_email: activePeer, text, read: false,
        });
        await loadMsgs();
      } catch (e) { toast.error(e.message); }
    }

    function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
  </script>
</body>
</html>
