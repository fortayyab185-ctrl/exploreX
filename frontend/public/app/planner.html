<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Planner - ExploreX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .planner-form {
      background: #fff;
      padding: 2rem;
      border-radius: 20px;
      border: 1px solid var(--border-subtle);
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
    }
    .activity-row {
      display: flex; gap: 1rem; padding: 1.15rem;
      border-radius: 14px;
      background: var(--background);
      border: 1px solid var(--border-subtle);
      margin-bottom: .75rem;
      transition: border-color .25s, box-shadow .2s;
    }
    .activity-row:hover { border-color: var(--teal-50); box-shadow: var(--shadow-xs); }
    .activity-row .time {
      flex-shrink: 0; width: 90px; text-align: center;
      padding: .5rem .65rem; border-radius: 10px;
      background: var(--teal); color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .8rem; font-weight: 600;
      letter-spacing: 0;
      align-self: flex-start;
    }
    .activity-row .info { flex: 1; min-width: 0; }
    .activity-row .a-name {
      font-family: 'Sora', sans-serif;
      font-size: 1rem; font-weight: 600;
      color: var(--text-1);
    }
    .activity-row .a-loc {
      display: inline-flex; align-items: center; gap: .35rem;
      font-size: .82rem; color: var(--teal-700);
      margin-top: .35rem;
    }
    .activity-row .a-desc {
      font-size: .85rem; color: var(--text-2);
      margin-top: .55rem; line-height: 1.55;
    }
    .activity-row .a-meta { display: flex; gap: .4rem; margin-top: .65rem; flex-wrap: wrap; }
    .saved-card {
      padding: 1.4rem;
      border-radius: 16px;
      border: 1px solid var(--border-subtle);
      background: #fff;
      box-shadow: var(--shadow-xs);
      transition: border-color .25s, box-shadow .25s, transform .25s;
      position: relative;
    }
    .saved-card::before {
      content: ''; position: absolute; left: 0; top: 12px; bottom: 12px;
      width: 3px; background: var(--teal); border-radius: 0 3px 3px 0;
    }
    .saved-card:hover {
      border-color: var(--teal-50);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .saved-card h3 {
      font-family: 'Sora', sans-serif;
      font-size: 1.1rem; font-weight: 600;
      color: var(--text-1);
      margin-bottom: .35rem;
    }
    .saved-card .actions { display: flex; gap: .5rem; margin-top: .9rem; }
  </style>
</head>
<body>
  <div id="app-nav-slot"></div>
  <main class="app-main">
    <div class="page-wrap">
      <div class="page-header">
        <p class="page-eyebrow">AI Planning</p>
        <h1 class="page-title">AI Trip <em>Planner</em></h1>
        <p class="page-sub">Let AI craft your perfect itinerary — tell us where, when, and your style.</p>
      </div>
      <div id="planner-content"><div class="text-center" style="padding:3rem"><div class="spinner spinner-lg" style="margin:0 auto"></div></div></div>
    </div>
  </main>
  <script src="/js/sdk.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/planner.js"></script>
  <script src="/js/chatbot.js"></script>
</body>
</html>
