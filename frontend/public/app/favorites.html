<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favorites - ExploreX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .fav-grid { display: grid; gap: 1.5rem; grid-template-columns: 1fr; }
    @media (min-width: 700px)  { .fav-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1100px) { .fav-grid { grid-template-columns: repeat(3, 1fr); } }
    .fav-card {
      display: flex; flex-direction: column;
      border-radius: 20px; overflow: hidden;
      border: 1px solid var(--border-subtle);
      background: #fff;
      transition: transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s, border-color .25s;
      position: relative;
      box-shadow: var(--shadow-sm);
    }
    .fav-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: var(--border); }
    .fav-card .img { aspect-ratio: 16/10; overflow: hidden; background: var(--muted); }
    .fav-card .img img { width: 100%; height: 100%; object-fit: cover; transition: transform .8s; }
    .fav-card:hover .img img { transform: scale(1.05); }
    .fav-card .body { padding: 1.4rem 1.4rem 1.4rem; flex: 1; display: flex; flex-direction: column; gap: .5rem; }
    .fav-card h3 { font-family: 'Sora', sans-serif; font-size: 1.15rem; font-weight: 600; color: var(--text-1); }
    .fav-card .meta { font-size: .82rem; color: var(--text-2); display: inline-flex; align-items: center; gap: .35rem; }
    .fav-card .actions { display: flex; gap: .55rem; margin-top: auto; padding-top: .8rem; }
    .fav-card .heart {
      position: absolute; top: 1rem; right: 1rem; z-index: 10;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.6);
      cursor: pointer;
      color: var(--teal);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm);
      transition: transform .2s, box-shadow .2s;
    }
    .fav-card .heart:hover { transform: scale(1.08); box-shadow: var(--shadow-md); }
    .recs-section {
      margin-top: 3.5rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border-subtle);
    }
  </style>
</head>
<body>
  <div id="app-nav-slot"></div>
  <main class="app-main">
    <div class="page-wrap">
      <div class="page-header">
        <p class="page-eyebrow">Saved</p>
        <h1 class="page-title">Your <em>Favorites</em></h1>
        <p class="page-sub">Places you saved to revisit, book, or share with friends.</p>
      </div>
      <div id="favs-out"><div class="text-center" style="padding:3rem"><div class="spinner spinner-lg" style="margin:0 auto"></div></div></div>

      <section class="recs-section">
        <p class="page-eyebrow">For you</p>
        <h2 class="page-title" style="font-size:1.5rem;margin-bottom:1rem">Recommended based on your favorites</h2>
        <div id="recs-out"><div class="text-muted text-sm">Loading personalized picks...</div></div>
      </section>
    </div>
  </main>
  <script src="/js/sdk.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/favorites.js"></script>
  <script src="/js/chatbot.js"></script>
</body>
</html>
