<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect - ExploreX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .tab-row {
      display: flex; gap: .35rem; margin-bottom: 1.75rem;
      border-bottom: 1px solid var(--border-subtle);
      flex-wrap: wrap;
    }
    .tab {
      padding: .85rem 1.15rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem; font-weight: 500;
      cursor: pointer; position: relative;
      border-bottom: 2px solid transparent;
      color: var(--text-2);
      background: none;
      transition: color .2s;
    }
    .tab:hover { color: var(--text-1); }
    .tab.active { color: var(--teal-700); font-weight: 600; }
    .tab.active::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px; background: var(--teal); border-radius: 2px 2px 0 0;
    }
    .tab .count {
      background: var(--teal); color: #fff;
      padding: 2px 8px; border-radius: 9999px;
      margin-left: .5rem;
      font-size: .68rem; font-weight: 600;
      display: inline-block;
    }

    .user-grid {
      display: grid; gap: 1.25rem;
      grid-template-columns: 1fr;
    }
    @media (min-width: 700px)  { .user-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1100px) { .user-grid { grid-template-columns: repeat(3, 1fr); } }

    .user-card {
      display: flex; flex-direction: column; align-items: center;
      gap: .65rem; padding: 1.75rem 1.5rem;
      border-radius: 18px;
      border: 1px solid var(--border-subtle);
      background: #fff;
      text-align: center;
      box-shadow: var(--shadow-xs);
      transition: transform .25s, box-shadow .25s, border-color .25s;
    }
    .user-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--teal-50);
    }
    .user-avatar {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--grad-primary);
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-weight: 600; font-size: 1.1rem;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-sm);
    }
    .user-info { flex: 1; min-width: 0; width: 100%; }
    .user-info .nm {
      font-family: 'Sora', sans-serif;
      font-size: 1.05rem; font-weight: 600;
      color: var(--text-1);
    }
    .user-info .em {
      font-size: .78rem;
      color: var(--text-3);
      margin-top: .15rem;
    }
    .user-info .bio {
      font-size: .85rem;
      color: var(--text-2);
      margin-top: .55rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .user-actions {
      display: flex; gap: .5rem; flex-shrink: 0;
      margin-top: .85rem;
      width: 100%;
      justify-content: center;
    }
    .user-card.row-layout {
      flex-direction: row; align-items: center; text-align: left;
      padding: 1.25rem 1.4rem;
    }
    .user-card.row-layout .user-actions {
      flex-direction: column; margin-top: 0; width: auto;
    }
    .user-card.row-layout .user-info .nm,
    .user-card.row-layout .user-info .em,
    .user-card.row-layout .user-info .bio { text-align: left; }
  </style>
</head>
<body>
  <div id="app-nav-slot"></div>
  <main class="app-main">
    <div class="page-wrap">
      <div class="page-header">
        <p class="page-eyebrow">Community</p>
        <h1 class="page-title">Connect with <em>Travelers</em></h1>
        <p class="page-sub">Find fellow explorers, exchange tips, and plan trips together.</p>
      </div>
      <div class="tab-row" id="tab-row">
        <button class="tab active" data-tab="discover">Discover</button>
        <button class="tab" data-tab="requests">Requests <span class="count hidden" id="cnt-requests">0</span></button>
        <button class="tab" data-tab="connections">My Connections</button>
        <button class="tab" data-tab="invites">Trip Invites <span class="count hidden" id="cnt-invites">0</span></button>
      </div>
      <div id="tab-content"><div class="text-center" style="padding:3rem"><div class="spinner spinner-lg" style="margin:0 auto"></div></div></div>
    </div>
  </main>
  <script src="/js/sdk.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/connect.js"></script>
  <script src="/js/chatbot.js"></script>
</body>
</html>
